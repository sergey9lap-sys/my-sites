
  <!DOCTYPE html>

      <title>ПРОЕКТ «ЛАЗАРЬ»</title>
      <style>
        body {
          margin: 0;
          font-family: Manrope, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          background: #fff;
        }

        .boot-shell {
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 24px;
          box-sizing: border-box;
        }

        .boot-card {
          width: 100%;
          max-width: 420px;
          border: 1px solid rgba(15, 23, 42, 0.08);
          border-radius: 24px;
          background: #fff;
          box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
          padding: 24px;
          text-align: center;
        }

        .boot-label {
          font-size: 11px;
          font-weight: 800;
          letter-spacing: 0.22em;
          text-transform: uppercase;
          color: #7c3aed;
        }

        .boot-title {
          margin: 14px 0 0;
          font-size: 28px;
          line-height: 1.1;
          font-weight: 800;
          color: #0f172a;
        }

        .boot-text {
          margin: 14px 0 0;
          font-size: 15px;
          line-height: 1.6;
          color: #475569;
        }

        .boot-loader {
          width: 44px;
          height: 44px;
          margin: 0 auto 18px;
          border-radius: 999px;
          border: 3px solid rgba(124, 58, 237, 0.18);
          border-top-color: #7c3aed;
          animation: boot-spin 0.9s linear infinite;
        }

        .boot-actions {
          display: none;
          margin-top: 18px;
        }

        .boot-button {
          appearance: none;
          border: none;
          border-radius: 16px;
          background: #7c3aed;
          color: #fff;
          font-size: 14px;
          font-weight: 700;
          padding: 14px 18px;
          cursor: pointer;
        }

        .boot-card.is-stalled .boot-loader {
          display: none;
        }

        .boot-card.is-stalled .boot-actions {
          display: block;
        }

        @keyframes boot-spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>

      <div id="root">

          <div class="boot-card" id="boot-card">

            <div class="boot-label">Загрузка страницы</div>
            <h1 class="boot-title">Открываем навигационный штаб</h1>
            <p class="boot-text" id="boot-text">Подготавливаем маршрутные данные.</p>
            <div class="boot-actions">
              <button class="boot-button" type="button" onclick="window.location.reload()">Обновить страницу</button>
            </div>
          </div>
        </div>
      </div>
      <script>
        window.__APP_BOOTED__ = false;
        window.setTimeout(function () {
          if (window.__APP_BOOTED__) return;
          var card = document.getElementById('boot-card');
          var text = document.getElementById('boot-text');
          if (!card || !text) return;
          card.classList.add('is-stalled');
          text.textContent = 'Если страница долго не открывается, попробуйте обновить ее. Если не поможет, откройте ссылку позже или напишите нам в поддержку.';
